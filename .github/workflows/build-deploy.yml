name: Build dash

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist/
        retention-days: 1

  deploy:
    environment:
      name: sbw-media-cicd

    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: new-deploy

    - name: Install lftp
      run: sudo apt-get install -y lftp

    - name: SFTP Deploy with backup and rollback capability
      env:
        SFTP_HOST: ${{ vars.SFTP_HOST }}
        SFTP_USERNAME: ${{ vars.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
        SFTP_REMOTE_PATH: ${{ vars.SFTP_REMOTE_PATH }}
        BACKUP_PATH: ${{ vars.SFTP_BACKUP_PATH || 'backups' }}
        NEW_DEPLOY_PATH: ${{ github.workspace }}/new-deploy
      run: |
        DEPLOY_TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        BACKUP_NAME="backup_${DEPLOY_TIMESTAMP}_${GITHUB_RUN_NUMBER}"

        echo "Starting deployment with backup..."
        echo "Backup name: ${BACKUP_NAME}"
        echo "New deployment from commit: ${GITHUB_SHA}"
        echo "Local source: ${NEW_DEPLOY_PATH}"
        echo "SFTP target: sftp://${SFTP_HOST}:${SFTP_PORT}${SFTP_REMOTE_PATH} (user: ${SFTP_USERNAME})"

        lftp -c "
        set sftp:auto-confirm yes;
        set net:timeout 30;
        set net:max-retries 3;
        set cmd:fail-exit yes;

        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;

        cd $SFTP_REMOTE_PATH;

        echo 'Taking snapshot of current deployment...';
        mkdir -p ../$BACKUP_PATH/${BACKUP_NAME};
        mirror . ../$BACKUP_PATH/${BACKUP_NAME}/;
        echo 'Backup created: ../$BACKUP_PATH/${BACKUP_NAME}';

        echo 'Uploading new deployment...';
        mirror -R --delete $NEW_DEPLOY_PATH/ ./;

        echo 'New deployment uploaded successfully';
        ls -l .;
        "

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: rollback

    steps:
    - name: Install lftp
      run: sudo apt-get install -y lftp

    - name: List available backups
      id: list-backups
      env:
        SFTP_HOST: ${{ vars.SFTP_HOST }}
        SFTP_USERNAME: ${{ vars.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
        BACKUP_PATH: ${{ vars.SFTP_BACKUP_PATH || 'backups' }}
      run: |
        echo "Available backups:"
        lftp -c "
        set sftp:auto-confirm yes;
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        cd $BACKUP_PATH;
        ls -lt;
        " > backups.txt

        LATEST_BACKUP=$(grep -E '^d' backups.txt | head -1 | awk '{print $NF}')
        echo "latest_backup=${LATEST_BACKUP}" >> $GITHUB_OUTPUT
        echo "Latest available backup: ${LATEST_BACKUP}"

    - name: Rollback to latest backup
      env:
        SFTP_HOST: ${{ vars.SFTP_HOST }}
        SFTP_USERNAME: ${{ vars.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
        SFTP_REMOTE_PATH: ${{ vars.SFTP_REMOTE_PATH }}
        BACKUP_PATH: ${{ vars.SFTP_BACKUP_PATH || 'backups' }}
        LATEST_BACKUP: ${{ steps.list-backups.outputs.latest_backup }}
      run: |
        if [ -z "$LATEST_BACKUP" ]; then
          echo "No backup found to rollback to!"
          exit 1
        fi

        echo "Rolling back to backup: ${LATEST_BACKUP}"

        lftp -c "
        set sftp:auto-confirm yes;
        set net:timeout 30;
        set net:max-retries 3;

        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;

        cd $SFTP_REMOTE_PATH;

        echo 'Restoring from backup: ../$BACKUP_PATH/${LATEST_BACKUP}/';
        mirror -R --delete ../$BACKUP_PATH/${LATEST_BACKUP}/ ./;

        echo 'Rollback completed successfully';
        ls -l .;
        "

    - name: Rollback notification
      run: |
        echo "Rollback completed!"
        echo "Deployment failed, rolled back to: ${{ steps.list-backups.outputs.latest_backup }}"
        echo "Check the failed deployment logs for details"

  cleanup-backups:
    needs: deploy
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Install lftp
      run: sudo apt-get install -y lftp

    - name: Clean old backups (keep last 10)
      env:
        SFTP_HOST: ${{ vars.SFTP_HOST }}
        SFTP_USERNAME: ${{ vars.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
        BACKUP_PATH: ${{ vars.SFTP_BACKUP_PATH || 'backups' }}
      run: |
        echo "Cleaning old backups (keeping last 10)..."

        lftp -c "
        set sftp:auto-confirm yes;
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        cd $BACKUP_PATH;
        ls -lt;
        " > all-backups.txt

        OLD_BACKUPS=$(grep -E '^d' all-backups.txt | awk '{print $NF}' | tail -n +11)

        if [ -z "$OLD_BACKUPS" ]; then
          echo "No old backups to remove."
          exit 0
        fi

        for BACKUP in $OLD_BACKUPS; do
          echo "Removing old backup: $BACKUP"
          lftp -c "
          set sftp:auto-confirm yes;
          open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
          cd $BACKUP_PATH;
          rm -rf $BACKUP;
          "
        done

        echo "Remaining backups:"
        lftp -c "
        set sftp:auto-confirm yes;
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        cd $BACKUP_PATH;
        ls -lt;
        "
