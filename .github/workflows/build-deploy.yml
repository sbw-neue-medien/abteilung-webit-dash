# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build dash

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [latest]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: dist/
        retention-days: 1

  deploy:
    environment:
      name: sbw-media-cicd
    
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: new-deploy
    
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: SFTP Deploy with backup and rollback capability
      env:
        SFTP_HOST: ${{ vars.SFTP_HOST }}
        SFTP_USERNAME: ${{ vars.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ vars.SFTP_PORT || '22' }}
        SFTP_REMOTE_PATH: ${{ vars.SFTP_REMOTE_PATH }}
        BACKUP_PATH: ${{ vars.SFTP_BACKUP_PATH || 'backups' }}
        TIMESTAMP: ${{ github.run_number }}-${{ github.sha }}-$(date +'%Y%m%d-%H%M%S')
      run: |
        # Create timestamp for this deployment
        DEPLOY_TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        BACKUP_NAME="backup_${DEPLOY_TIMESTAMP}_${GITHUB_RUN_NUMBER}"
        
        echo "🔄 Starting deployment with backup..."
        echo "📦 Backup name: ${BACKUP_NAME}"
        echo "🆕 New deployment from commit: ${GITHUB_SHA}"
        
        lftp -c "
        set sftp:auto-confirm yes;
        set net:timeout 30;
        set net:max-retries 3;
        
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        
        # Navigate to the main deployment directory
        cd $SFTP_REMOTE_PATH;
        
        # STEP 1: Create backup of current deployment (if exists)
        echo '📸 Taking snapshot of current deployment...';
        
        # Check if current deployment has any files
        if [ -n \"\$(ls -A 2>/dev/null)\" ]; then
          # Create backup directory if it doesn't exist
          mkdir -p ../$BACKUP_PATH;
          
          # Create timestamped backup
          echo 'Creating backup: ../$BACKUP_PATH/${BACKUP_NAME}';
          mkdir -p ../$BACKUP_PATH/${BACKUP_NAME};
          
          # Copy all current files to backup
          mirror . ../$BACKUP_PATH/${BACKUP_NAME}/;
          
          echo '✅ Backup created successfully';
          
          # List backup contents
          echo 'Backup contents:';
          ls -la ../$BACKUP_PATH/${BACKUP_NAME}/;
        else
          echo '⚠️ No existing deployment found to backup';
        fi;
        
        # STEP 2: Clean current directory but keep it ready for new deployment
        echo '🧹 Cleaning current deployment directory...';
        rm -rf .;
        mkdir -p .;
        
        # STEP 3: Upload new deployment
        echo '📤 Uploading new deployment...';
        mirror -R ../new-deploy/ ./
        
        echo '✅ New deployment uploaded successfully';
        
        # STEP 4: Show deployment info
        echo '📋 Deployment contents:';
        ls -la .;
        "
    
    - name: Create deployment manifest
      run: |
        cat > deployment-info.txt << EOF
        ========================================
        DEPLOYMENT INFORMATION
        ========================================
        Deploy Time: $(date)
        GitHub Run ID: ${{ github.run_id }}
        GitHub Run Number: ${{ github.run_number }}
        Commit SHA: ${{ github.sha }}
        Commit Message: ${{ github.event.head_commit.message }}
        Branch: ${{ github.ref_name }}
        Triggered by: ${{ github.actor }}
        ========================================
        EOF
        
        echo "📄 Deployment manifest created"
        cat deployment-info.txt
    
    - name: List recent backups (optional)
      run: |
        echo "📚 Recent backups on server:"
        lftp -c "
        set sftp:auto-confirm yes;
        open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT || '22' }};
        cd ${{ secrets.SFTP_BACKUP_PATH || 'backups' }};
        ls -lt | head -10;
        "

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: rollback
      url: ${{ steps.rollback.outputs.url }}
    
    steps:
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
    
    - name: List available backups
      id: list-backups
      run: |
        echo "📚 Available backups:"
        lftp -c "
        set sftp:auto-confirm yes;
        open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} sftp://${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT || '22' }};
        cd ${{ secrets.SFTP_BACKUP_PATH || 'backups' }};
        ls -lt;
        " > backups.txt
        
        # Get the latest backup
        LATEST_BACKUP=$(grep -E '^d' backups.txt | head -1 | awk '{print $NF}')
        echo "latest_backup=${LATEST_BACKUP}" >> $GITHUB_OUTPUT
        echo "Latest available backup: ${LATEST_BACKUP}"
    
    - name: Rollback to latest backup
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
        SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        BACKUP_PATH: ${{ secrets.SFTP_BACKUP_PATH || 'backups' }}
        LATEST_BACKUP: ${{ steps.list-backups.outputs.latest_backup }}
      run: |
        if [ -z "$LATEST_BACKUP" ]; then
          echo "❌ No backup found to rollback to!"
          exit 1
        fi
        
        echo "🔄 Rolling back to backup: ${LATEST_BACKUP}"
        
        lftp -c "
        set sftp:auto-confirm yes;
        set net:timeout 30;
        set net:max-retries 3;
        
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        
        # Navigate to deployment directory
        cd $SFTP_REMOTE_PATH;
        
        # Clean current failed deployment
        echo '🧹 Cleaning failed deployment...';
        rm -rf .;
        mkdir -p .;
        
        # Restore from backup
        echo '📥 Restoring from backup: ../$BACKUP_PATH/${LATEST_BACKUP}/';
        mirror ../$BACKUP_PATH/${LATEST_BACKUP}/ ./
        
        echo '✅ Rollback completed successfully';
        
        # Show restored files
        echo '📋 Restored deployment contents:';
        ls -la .;
        "
    
    - name: Rollback notification
      run: |
        echo "⚠️ Rollback completed!"
        echo "Deployment failed, rolled back to: ${LATEST_BACKUP}"
        echo "Check the failed deployment logs for details"

  cleanup-backups:
    needs: deploy
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
    
    - name: Clean old backups (keep last 10)
      env:
        SFTP_HOST: ${{ secrets.SFTP_HOST }}
        SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
        SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
        BACKUP_PATH: ${{ secrets.SFTP_BACKUP_PATH || 'backups' }}
      run: |
        echo "🧹 Cleaning old backups (keeping last 10)..."
        
        lftp -c "
        set sftp:auto-confirm yes;
        open -u $SFTP_USERNAME,$SFTP_PASSWORD sftp://$SFTP_HOST:$SFTP_PORT;
        
        cd $BACKUP_PATH;
        
        # List backups sorted by date, skip first 10 (keep them), delete the rest
        echo 'Removing old backups...';
        ls -t | tail -n +11 | while read old_backup; do
          echo 'Removing old backup:' \$old_backup;
          rm -rf \$old_backup;
        done;
        
        echo '📚 Remaining backups:';
        ls -lt;
        "
